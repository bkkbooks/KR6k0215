body:
  text: 三衣賦吾有三衣古聖真規粗疏麻苧為其體獸毛蠶口害命傷慈青黑木蘭壞其色五正五間涉俗生譏其奉持也如鳥兩翼其敬護也如身薄皮信是恆沙諸佛之標幟賢聖沙門之軌儀九十六道起信之首二十五有植福之基是以堅誓獸王忍死而頻加稱歎蓮華色女作戲而盡斷貪癡弘誓甚重至德難思龍被免金翅之禍人得息戰歒之危末流浮薄正教衰遲競貨亂朱之服卒遭濫吹之嗤壯大於貢高我慢欺壓於碩德厖眉習以成俗愚不知非汝當敬遵彝範仰荷恩慈時時自慶步步勿離潛神樂國兮銖衣自被垂形忍界兮報服常隨劫石可銷想斯言而不泯太空有盡諒此志以難移䥫鉢賦吾有䥫鉢裁製合轍斗半為量不大不小竹煙熏治唯光唯潔似二分之明珠若將圓之皎月清晨入聚群心發越黃粱傾散有若金沙白淅高堆宛如積雪與香積之變現無殊比自然之天供何別咨爾同舟宜自括不耕不粒不鋤不割有生之命自何而活且夫口腹無厭貪源叵竭正念微乖羅剎已奪嗜一時之甘味為萬劫之飢渴萬金可受保君未徹杯水難堪聖教明說是宜五觀無違三匙有節慎勿抂彼信施以養穢軀會須藉此資緣早求自脫坐具賦吾有坐具裁量有據其色相則一類袈裟其物體則兩重疏布長四廣三壞新揲故彼形之大者可用開增吾身之小兮從初制度好大惡小但責他非反制為開焉知自誤嘗聞比丘身者五分之塔也尼師壇者四方之基也是則道者所資豈宜身之為護安禪講法敷之無失於威儀入聚遊方持之勿離於跬步不然諸律有違制刑科一生無如法坐處漉囊賦吾有漉囊製造有方緻練作底熟鐵為匡其用瀘兮深須諦視其還放兮切忌損傷宜知我佛仁慈尚不遺於微物將使吾曹飲用得幸免於餘殃一化境中上下皆制半由旬內往返須將世多輕略孰究否臧或聞而不製嗤為小道或製而不用但懸於草堂斯由內無慈愍外恣疏往塞來蒙之津徑害吾教之紀綱汝當存誠捋守竭力張豈止四生有賴抑使三寶增光錫杖賦吾有一錫裁製有式上下三停聳幹六尺十二環圜而無缺示因緣乃死乃生兩鉆開而復同顯空有不離不即匪以扶羸唯將丐食執之兮居然寂寂振之兮其鳴歷歷直欲使諸有門開三途苦息隨身所止懸之屋壁塵垢易生長須拂拭擲雲外兮不以為難解虎競兮未須勞力幸哉凡愚踏夫聖跡外露麁暴內懷荊棘用之捨之兮能無夕惕
